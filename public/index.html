<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Comet</title>

<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* (UNCHANGED STYLES — kept as-is for your UI) */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07070d;--bg2:#0d0d1a;--bg3:#12121f;--surface:#18182a;--surface2:#1e1e30;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --orange:#f97316;--orange2:#fb923c;--orange3:#fdba74;
  --blue:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --text:#f0efff;--muted:#7878a0;
  --display:'Cabinet Grotesk',sans-serif;
  --body:'Instrument Sans',sans-serif;
}
html,body{height:100%;font-family:var(--body);background:var(--bg);color:var(--text);}
.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:60px 1fr;min-height:100vh;}
.topbar{grid-column:1/-1;background:rgba(7,7,13,0.95);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;}
.topbar-logo{text-decoration:none;color:var(--text);font-weight:900;font-family:var(--display);}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:1rem;}
main{padding:2rem;overflow:auto;}
.page{display:none;}
.page.active{display:block;}
.deploy-card{background:var(--bg2);padding:1rem;border-radius:12px;border:1px solid var(--border);margin-bottom:10px;}
.btn-action{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:white;cursor:pointer;}
.btn-action:hover{background:var(--surface2);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);padding:20px;border-radius:12px;width:500px;}
</style>
</head>

<body>

<div class="app">

<!-- TOP -->
<header class="topbar">
  <a class="topbar-logo" href="/">☄️ Comet</a>
</header>

<!-- SIDEBAR -->
<nav class="sidebar">
  <button onclick="showPage('deployments')" class="btn-action">Deployments</button>
  <button onclick="showPage('repos')" class="btn-action">Repositories</button>
  <button onclick="showPage('settings')" class="btn-action">Settings</button>
</nav>

<!-- MAIN -->
<main>

<!-- DEPLOYMENTS -->
<div id="page-deployments" class="page active">
  <h2>Deployments</h2>
  <div id="deployments-list"></div>
</div>

<!-- REPOS -->
<div id="page-repos" class="page">
  <h2>Repositories</h2>
  <div id="repos-list">Loading...</div>
</div>

<!-- SETTINGS -->
<div id="page-settings" class="page">
  <h2>Settings</h2>
  <p>GitHub OAuth connected account</p>
</div>

</main>
</div>

<!-- DOMAIN MODAL -->
<div class="modal-overlay" id="domain-modal">
  <div class="modal">
    <h3>Custom Domain</h3>
    <input id="domain-input" placeholder="yourdomain.com" style="width:100%;padding:8px;">
    <button class="btn-action" onclick="saveDomain()">Save</button>
  </div>
</div>

<script>

let deployments = [];
let repos = [];
let activeSlug = null;

/* NAV */
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
}

/* INIT */
async function init(){
  await loadDeployments();
  await loadRepos();
}
init();

/* DEPLOYMENTS */
async function loadDeployments(){
  const res = await fetch('/api/deployments');
  deployments = await res.json();
  renderDeployments();
}

function renderDeployments(){
  const el = document.getElementById('deployments-list');

  if(!deployments.length){
    el.innerHTML = "<p>No deployments yet</p>";
    return;
  }

  el.innerHTML = deployments.map(d => `
    <div class="deploy-card">
      <b>${d.name}</b><br>
      <a href="${d.url}" target="_blank">${d.url}</a><br>

      <button class="btn-action" onclick="openDomain('${d.slug}')">Domain</button>
      <button class="btn-action" onclick="openLogs('${d.slug}')">Logs</button>
    </div>
  `).join('');
}

/* REPOS */
async function loadRepos(){
  const res = await fetch('/api/repos');
  repos = await res.json();

  document.getElementById('repos-list').innerHTML =
    repos.map(r => `
      <div class="deploy-card">
        <b>${r.name}</b>
        <p>${r.description || ''}</p>
        <button class="btn-action" onclick="deploy('${r.url}','${r.name}')">
          Deploy
        </button>
      </div>
    `).join('');
}

/* DEPLOY */
async function deploy(url,name){
  await fetch('/api/deploy', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({repoUrl:url,repoName:name})
  });

  await loadDeployments();
}

/* DOMAIN */
function openDomain(slug){
  activeSlug = slug;
  document.getElementById('domain-modal').classList.add('open');
}

async function saveDomain(){
  const domain = document.getElementById('domain-input').value;

  await fetch(`/api/deployments/${activeSlug}/domain`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({domain})
  });

  document.getElementById('domain-modal').classList.remove('open');
  await loadDeployments();
}

/* LOGS (basic placeholder) */
function openLogs(slug){
  alert("Logs for: " + slug);
}

</script>

</body>
</html>
