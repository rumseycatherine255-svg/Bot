<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Comet AI</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system;
  background: #0b0c10;
  color: #eaeaea;
  height: 100vh;
  overflow: hidden;
}

/* LAYOUT */
.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #11131a;
  padding: 14px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #222;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.logo span {
  color: #6aa9ff;
}

.newChat {
  background: #1f2430;
  border: none;
  padding: 10px;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 12px;
}

.chatItem {
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  color: #aaa;
  margin-top: 6px;
}

.chatItem.active {
  background: #1c2230;
  color: white;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* CHAT */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 40px;
  max-width: 900px;
  width: 100%;
  margin: auto;
}

.msg {
  margin-bottom: 14px;
  line-height: 1.5;
  font-size: 15px;
  white-space: pre-wrap;
  padding: 10px 14px;
  border-radius: 12px;
  max-width: 80%;
}

.user {
  background: #2a2f3a;
  margin-left: auto;
}

.ai {
  background: #161a22;
  margin-right: auto;
  border: 1px solid #222;
}

/* INPUT */
.composer {
  display: flex;
  gap: 10px;
  padding: 14px;
  border-top: 1px solid #222;
  background: #0b0c10;
  max-width: 900px;
  margin: auto;
  width: 100%;
  align-items: center;
}

textarea {
  flex: 1;
  background: #151a23;
  border: none;
  border-radius: 10px;
  padding: 12px;
  color: white;
  resize: none;
  outline: none;
}

button {
  background: #6aa9ff;
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  color: black;
  font-weight: 600;
  cursor: pointer;
}

.upload {
  cursor: pointer;
  font-size: 18px;
  padding: 0 8px;
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">☄️ <span>Comet</span></div>

    <button class="newChat">+ New Chat</button>

    <div class="chatItem active">New Conversation</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div id="chat" class="chat"></div>

    <div class="composer">

      <label class="upload">📎
        <input type="file" id="file" hidden>
      </label>

      <textarea id="input" placeholder="Message Comet..."></textarea>

      <button onclick="send()">Send</button>

    </div>

  </div>

</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  const file = document.getElementById("file").files[0];

  if (!text.trim() && !file) return;

  addMsg("user", text);

  let image = null;
  if (file) image = await toBase64(file);

  const res = await fetch("/api", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text, image })
  });

  const data = await res.json();

  addMsg("ai", data.reply);

  input.value = "";
}

function addMsg(role, text) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function toBase64(file) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result);
    reader.readAsDataURL(file);
  });
}
</script>

</body>
</html>
