<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>
<style>
body { font-family: sans-serif; background:#111; color:#fff; margin:0; }
#chat { padding:20px; height:80vh; overflow:auto; }
.msg { margin:10px 0; padding:10px; border-radius:8px; max-width:70%; }
.user { background:#333; margin-left:auto; }
.ai { background:#222; }
#bar { display:flex; padding:10px; }
input { flex:1; padding:10px; }
button { padding:10px; }
</style>
</head>
<body>

<div id="chat"></div>

<div id="bar">
  <input id="input" />
  <button onclick="send()">Send</button>
</div>

<script>
const API = "YOUR_WORKER_URL";

function add(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  document.getElementById("chat").appendChild(div);
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  input.value = "";

  add(text, "user");

  const res = await fetch(API, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  add(data.reply, "ai");
}
</script>

</body>
</html>
