<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#05050a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#0f0f18;
padding:20px;
display:flex;
flex-direction:column;
gap:8px;
border-right:1px solid #1f1f2a;
}

.brand{
font-size:20px;
font-weight:700;
margin-bottom:10px;
}

.nav{
display:flex;
flex-direction:column;
gap:6px;
margin-top:10px;
}

.nav button{
background:none;
border:none;
color:#aaa;
text-align:left;
padding:10px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.nav button:hover{
background:#1a1a28;
color:white;
}

.nav button.active{
background:#7c3aed;
color:white;
}

/* MAIN */
.main{
flex:1;
padding:20px;
overflow:auto;
}

/* SECTION */
.section{
display:none;
}

.section.active{
display:block;
}

/* CARDS */
.card{
background:#141420;
padding:14px;
border-radius:10px;
margin-bottom:10px;
border:1px solid #222;
cursor:pointer;
}

small{color:#888}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="brand">☄️ Dashboard</div>

<div class="nav">
<button class="active" onclick="show('overview')">Overview</button>
<button onclick="show('repos')">Repositories</button>
<button onclick="show('deploys')">Deployments</button>
<button onclick="show('logs')">Logs</button>
<button onclick="show('domains')">Domains</button>
<button onclick="show('settings')">Settings</button>
<button onclick="show('account')">Account</button>
</div>

</div>

<!-- MAIN -->
<div class="main">

<!-- OVERVIEW -->
<div id="overview" class="section active">
<h2>Overview</h2>
<div class="card">Welcome to your deployment dashboard</div>
</div>

<!-- REPOS -->
<div id="repos" class="section">
<h2>Repositories</h2>
<div id="repoList"></div>
</div>

<!-- DEPLOYS -->
<div id="deploys" class="section">
<h2>Deployments</h2>
<div class="card">Your active deployments will show here</div>
</div>

<!-- LOGS -->
<div id="logs" class="section">
<h2>Logs</h2>
<div class="card">Open a deployment to view logs</div>
</div>

<!-- DOMAINS -->
<div id="domains" class="section">
<h2>Domains</h2>
<div class="card">
Add custom domain<br><br>
DNS: CNAME → your-host
</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="section">
<h2>Settings</h2>
<div class="card">Account settings</div>
</div>

<!-- ACCOUNT -->
<div id="account" class="section">
<h2>Account</h2>
<div class="card">GitHub OAuth connected account</div>
</div>

</div>

<script>

function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
}

/* LOAD REPOS */
async function load(){
const r = await fetch("/api/repos");
const data = await r.json();

document.getElementById("repoList").innerHTML =
data.map(r=>`
<div class="card" onclick="deploy('${r.url}','${r.name}')">
${r.name}<br><small>${r.desc||""}</small>
</div>
`).join("");
}

/* DEPLOY */
async function deploy(url,name){
await fetch("/api/deploy",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({repoUrl:url,name})
});
alert("Deploy started");
}

load();

</script>

</body>
</html>
